<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantra AI — Reset Password</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/quantra-icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow--1"></div>
  <main class="container" style="max-width:420px;margin-top:13vh">
    <div class="brand__name" style="font-size:1.6rem;justify-content:center;display:flex;margin-bottom:1.4rem">Quantra<span class="brand__ai">AI</span></div>
    <div class="card" style="padding:1.8rem">
      <h1 style="font-size:1.35rem;margin-bottom:1rem;text-align:center">Choose a new password</h1>
      <form id="rForm">
        <div class="mfield"><label for="rPass">New password</label><input id="rPass" type="password" minlength="8" required /></div>
        <div class="mfield"><label for="rPass2">Confirm password</label><input id="rPass2" type="password" minlength="8" required /></div>
        <div class="merr" id="rErr" hidden></div>
        <button class="btn btn--primary btn--block" id="rSubmit" type="submit">Update password</button>
      </form>
      <p id="rDone" hidden style="text-align:center;color:var(--mint);margin-top:1rem">✓ Password updated. <a href="index.html" style="color:var(--mint)">Sign in →</a></p>
    </div>
  </main>
  <script>
    const t = new URLSearchParams(location.search).get('token');
    const $ = (id) => document.getElementById(id);
    $('rForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = $('rErr'); err.hidden = true;
      if (!t) { err.hidden = false; err.textContent = 'Missing reset token.'; return; }
      if ($('rPass').value !== $('rPass2').value) { err.hidden = false; err.textContent = 'Passwords do not match.'; return; }
      const btn = $('rSubmit'); btn.disabled = true; btn.textContent = '…';
      try {
        const r = await fetch('/api/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: t, password: $('rPass').value }) });
        const d = await r.json();
        if (r.ok && d.ok) { $('rForm').hidden = true; $('rDone').hidden = false; }
        else { err.hidden = false; err.textContent = (d && d.error) || 'Could not reset password.'; btn.disabled = false; btn.textContent = 'Update password'; }
      } catch { err.hidden = false; err.textContent = 'Something went wrong.'; btn.disabled = false; btn.textContent = 'Update password'; }
    });
  </script>
</body>
</html>
