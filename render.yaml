# Render Blueprint — one-click permanent deploy for Quantra AI.
# In Render: New +  ->  Blueprint  ->  pick this repo. It creates the web
# service and a free Postgres, and wires DATABASE_URL automatically so
# accounts/watchlists persist across restarts and deploys.
services:
  - type: web
    name: quantra-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quantra-db
          property: connectionString
      # Optional features — set these in the Render dashboard if you use them:
      # - key: ANTHROPIC_API_KEY      (enables the premium LLM "Quantra AI" read)
      # - key: QUANTRA_AI_MODEL       (e.g. your model id)
      # - key: STRIPE_SECRET_KEY      (enables real billing)
      # - key: APP_URL                (your final https URL, for email links)

databases:
  - name: quantra-db
    plan: free
