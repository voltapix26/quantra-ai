<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantra AI — Daily Brief</title>
  <meta name="description" content="Your personalized daily market brief — what moved on your watchlist, market breadth, and upcoming earnings, summarized by Quantra AI." />
  <link rel="icon" type="image/svg+xml" href="assets/brand/quantra-icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0A0F1C" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=59" />
  <style>
    .br{max-width:860px;margin:0 auto;padding:1.3rem 0 4rem}
    .br h1{font-size:1.9rem;margin-bottom:.15rem}
    .br-date{color:var(--muted-2);margin-bottom:1.2rem;font-size:.9rem}
    .br-narr{background:linear-gradient(135deg,rgba(52,211,153,.08),rgba(129,140,248,.08));border:1px solid var(--line-2);border-radius:var(--r-lg);padding:1.2rem 1.3rem;margin-bottom:1.3rem;position:relative}
    .br-narr__badge{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--cyan);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
    .br-narr__text{font-size:1.05rem;line-height:1.65;color:var(--text)}
    .br-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:680px){.br-grid{grid-template-columns:1fr}}
    .br-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:.9rem 1rem}
    .br-card h3{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-2);margin:0 0 .6rem}
    .br-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;border-bottom:1px solid var(--line);text-decoration:none;color:inherit}
    .br-row:last-child{border-bottom:0}
    .br-row__sym{font-family:'Space Grotesk';font-weight:700;min-width:58px;color:var(--text)}
    .br-row__name{flex:1;color:var(--muted-2);font-size:.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .br-row__px{font-size:.82rem;color:var(--muted);font-variant-numeric:tabular-nums}
    .br-row__chg{font-weight:600;min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
    .up{color:var(--mint)}.down{color:var(--rose)}
    .br-breadth{margin:.2rem 0 .6rem}
    .br-bar{height:12px;border-radius:6px;overflow:hidden;display:flex;background:var(--line-2)}
    .br-bar i{display:block;height:100%}.br-bar .up{background:var(--mint)}.br-bar .down{background:var(--rose)}.br-bar .flat{background:#5A6680}
    .br-breadth__lbl{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted-2);margin-top:.35rem}
    .br-ev{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--line);font-size:.85rem}
    .br-ev:last-child{border-bottom:0}.br-ev b{font-family:'Space Grotesk'}
    .br-actions{display:flex;gap:.6rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
    .br-state{padding:2.4rem;text-align:center;color:var(--muted)}
    .br-foot{font-size:.74rem;color:var(--muted-2);margin-top:1.2rem}
    .br-skel{height:1.05rem;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.1),rgba(255,255,255,.05));border-radius:5px;margin:.4rem 0;animation:brsk 1.3s infinite}
    @keyframes brsk{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}
  </style>
</head>
<body>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <header class="bar">
    <div class="container bar__inner">
      <a href="index.html" class="brand"><span class="brand__mark">
        <svg viewBox="0 0 100 100" width="26" height="26" fill="none" aria-hidden="true"><defs><linearGradient id="qm" x1="0" y1="1" x2="1" y2="0"><stop stop-color="#34D399"/><stop offset=".5" stop-color="#22D3EE"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs><path d="M60.9 19.9 A32 32 0 1 0 80.1 39.1" stroke="url(#qm)" stroke-width="7" stroke-linecap="round"/><path d="M26 66 L42 54 L54 58 L82 16" stroke="url(#qm)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><circle cx="82" cy="16" r="6" fill="#34D399"/></svg>
      </span><span class="brand__name">Quantra<span class="brand__ai">AI</span></span></a>
      <span class="bar__tag">Daily Brief</span>
      <div class="bar__spacer"></div>
      <nav class="bar__links">
        <a href="terminal.html">Terminal</a>
        <a href="brief.html" class="is-active">Brief</a>
        <a href="discover.html">Discover</a>
        <a href="calendar.html">Calendar</a>
        <a href="paper.html">Paper</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="community.html">Community</a>
      </nav>
    </div>
  </header>

  <main class="container br">
    <h1>Your daily brief</h1>
    <div class="br-date" id="brDate"></div>
    <div class="br-actions">
      <button class="btn btn--primary btn--sm" id="brRefresh">↻ Regenerate</button>
      <span style="color:var(--muted-2);font-size:.82rem" id="brSrc"></span>
      <label class="br-digest" id="brDigestWrap" hidden title="One email every morning with this brief — unsubscribe any time">
        <input type="checkbox" id="brDigest" /> 📧 Email me this brief every morning
      </label>
    </div>
    <div id="brForYou"></div>
    <div id="brBody"></div>
    <p class="br-foot">Built from your watchlist &amp; portfolio using live data. The <b>For you</b> panel learns from the assets you open most.</p>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const onServer = location.protocol === 'http:' || location.protocol === 'https:';
    const tok = (() => { try { return localStorage.getItem('quantra.sid') || ''; } catch { return ''; } })();
    const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const sChg = (n) => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    const money = (n, c) => n == null ? '—' : (c === 'USD' || !c ? '$' : '') + Number(n).toLocaleString('en-US',{maximumFractionDigits: Math.abs(n) >= 1000 ? 0 : Math.abs(n) >= 1 ? 2 : 6}) + (c && c !== 'USD' ? ' ' + c : '');
    const daysAway = (iso) => { const d = Math.round((new Date(iso + 'T00:00:00') - new Date(new Date().toDateString())) / 864e5); return d <= 0 ? 'today' : d === 1 ? 'tomorrow' : 'in ' + d + 'd'; };
    const link = (it) => `terminal.html?type=${encodeURIComponent(it.type)}&id=${encodeURIComponent(it.id || it.symbol)}&symbol=${encodeURIComponent(it.symbol)}&name=${encodeURIComponent(it.name || it.symbol)}`;

    function myAssets() {
      let watch = [], pf = [];
      try { watch = JSON.parse(localStorage.getItem('quantra.watch') || '[]'); } catch {}
      try { pf = JSON.parse(localStorage.getItem('quantra.portfolio') || '[]'); } catch {}
      const map = new Map();
      [...watch, ...pf].forEach((x) => { if (x && x.symbol) { const k = (x.type || '') + ':' + (x.id || x.symbol); if (!map.has(k)) map.set(k, { type: x.type, id: x.id || x.symbol, symbol: x.symbol, name: x.name || x.symbol }); } });
      return [...map.values()].slice(0, 40);
    }

    function render(d) {
      const tone = d.avg > 0.3 ? 'up' : d.avg < -0.3 ? 'down' : '';
      const moversRows = d.rows.length ? d.rows.map((r) => `<a class="br-row" href="${link(r)}"><span class="br-row__sym">${esc(r.symbol)}</span><span class="br-row__name">${esc(r.name)}</span><span class="br-row__px">${money(r.price, r.currency)}</span><span class="br-row__chg ${r.change >= 0 ? 'up' : 'down'}">${sChg(r.change)}</span></a>`).join('') : '<div class="br-state" style="padding:1rem">No priced assets.</div>';
      let breadthHtml = '<div class="br-state" style="padding:1rem">Market data unavailable.</div>';
      if (d.market) {
        const b = d.market, tot = Math.max(1, b.up + b.down + b.flat);
        breadthHtml = `<div class="br-breadth"><div class="br-bar"><i class="up" style="width:${(b.up/tot*100).toFixed(1)}%"></i><i class="flat" style="width:${(b.flat/tot*100).toFixed(1)}%"></i><i class="down" style="width:${(b.down/tot*100).toFixed(1)}%"></i></div>
          <div class="br-breadth__lbl"><span class="up">▲ ${b.up}</span><span class="${b.avg>=0?'up':'down'}">${sChg(b.avg)} avg · ${b.avg>=0?'risk-on':'risk-off'}</span><span class="down">${b.down} ▼</span></div></div>`;
      }
      const earnHtml = d.earnings.length ? d.earnings.map((e) => `<div class="br-ev"><b>${esc(e.symbol)}</b><span style="color:var(--muted-2)">${e.date} · ${daysAway(e.date)}</span></div>`).join('') : '<div style="color:var(--muted-2);font-size:.84rem;padding:.4rem 0">No earnings on your watchlist soon.</div>';
      $('brBody').innerHTML = `
        <div class="br-narr">
          <div class="br-narr__badge">${d.source === 'ai' ? '✦ Quantra AI' : '✦ Quantra'} · personalized brief</div>
          <div class="br-narr__text">${esc(d.text)}</div>
        </div>
        <div class="br-grid">
          <div class="br-card"><h3>Your watchlist today (${d.up} up · ${d.down} down)</h3>${moversRows}</div>
          <div>
            <div class="br-card" style="margin-bottom:1rem"><h3>Market breadth</h3>${breadthHtml}</div>
            <div class="br-card"><h3>Upcoming earnings</h3>${earnHtml}</div>
          </div>
        </div>`;
      $('brSrc').textContent = d.source === 'ai' ? 'Narrated by Quantra AI' : 'Generated by the Quantra engine';
    }

    async function load() {
      $('brDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      if (!onServer) { $('brBody').innerHTML = '<div class="br-state">Run the live server to generate your brief.</div>'; return; }
      const items = myAssets();
      if (!items.length) { $('brBody').innerHTML = '<div class="br-state">Your watchlist is empty. Add assets from the <a href="terminal.html">terminal</a> or <a href="discover.html">discover</a> page, then come back for a personalized brief.</div>'; return; }
      $('brBody').innerHTML = '<div class="br-narr"><div class="br-narr__badge">✦ Quantra · generating…</div><div class="br-skel" style="width:92%"></div><div class="br-skel" style="width:85%"></div><div class="br-skel" style="width:78%"></div></div>';
      try {
        const headers = { 'Content-Type': 'application/json' }; if (tok) headers.Authorization = 'Bearer ' + tok;
        const d = await (await fetch('/api/brief', { method: 'POST', headers, credentials: 'same-origin', body: JSON.stringify({ items }) })).json();
        if (!d.ok) { $('brBody').innerHTML = '<div class="br-state">Could not generate your brief right now.</div>'; return; }
        render(d);
      } catch { $('brBody').innerHTML = '<div class="br-state">Could not generate your brief right now.</div>'; }
    }
    async function loadForYou() {
      if (!onServer || !tok) return;   // personalized "For you" is for signed-in users
      try {
        const f = await (await fetch('/api/me/foryou', { headers: { Authorization: 'Bearer ' + tok }, credentials: 'same-origin' })).json();
        if (!f || !Array.isArray(f.watched) || !f.watched.length) return;
        const rows = f.watched.map((r) => `<a class="br-row" href="${link(r)}"><span class="br-row__sym">${esc(r.symbol)}</span><span class="br-row__name">${esc(r.name || '')}</span><span class="br-row__px">${money(r.price, r.currency)}</span><span class="br-row__chg ${r.change >= 0 ? 'up' : 'down'}">${sChg(r.change)}</span></a>`).join('');
        $('brForYou').innerHTML = `<div class="br-card" style="margin-bottom:1.3rem"><h3>✦ For you — the assets you follow most${f.favoriteClass ? ' · mostly ' + esc(f.favoriteClass) : ''}</h3>${rows}</div>`;
      } catch {}
    }
    // Daily-digest email opt-in (signed-in users): prefs.digestEmail synced via /api/me/data
    async function initDigest() {
      if (!onServer || !tok) return;
      const wrap = $('brDigestWrap'), box = $('brDigest');
      try {
        const d = await (await fetch('/api/me/data', { headers: { Authorization: 'Bearer ' + tok }, credentials: 'same-origin' })).json();
        box.checked = !!(d && d.prefs && d.prefs.digestEmail);
        wrap.hidden = false;
      } catch { return; }
      box.addEventListener('change', async () => {
        try {
          await fetch('/api/me/data', { method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + tok }, credentials: 'same-origin', body: JSON.stringify({ prefs: { digestEmail: box.checked } }) });
          wrap.style.color = box.checked ? 'var(--mint)' : '';
        } catch { box.checked = !box.checked; }
      });
    }
    $('brRefresh').addEventListener('click', load);
    load(); loadForYou(); initDigest();
  </script>
  <script src="i18n.js?v=1" defer></script>
</body>
</html>
